services:
  playwright:
    build:
      context: .
      dockerfile: Dockerfile.browser
    init: true
    ports:
      - "3000:3000"
    # Playwright's server exposes an HTTP /json listing of its browser
    # endpoints; it answers only once the WebSocket server is accepting
    # connections, so this doubles as a readiness gate for clients.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/json"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_dev:
    image: postgres:18
    environment:
      POSTGRES_USER: pravda
      POSTGRES_PASSWORD: pravda
      POSTGRES_DB: pravda_dev
    volumes:
      - pgdata_dev:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pravda"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres_test:
    image: postgres:18
    environment:
      POSTGRES_USER: pravda
      POSTGRES_PASSWORD: pravda
      POSTGRES_DB: pravda_test
    volumes:
      - pgdata_test:/var/lib/postgresql
    ports:
      - "5433:5432"

volumes:
  pgdata_dev:
  pgdata_test:
