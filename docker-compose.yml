services:
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres_dev

  playwright:
    build:
      context: .
      dockerfile: Dockerfile.browser
    init: true
    ports:
      - "3000:3000"
  postgres_dev:
    image: postgres:18
    environment:
      POSTGRES_USER: pravda
      POSTGRES_PASSWORD: pravda
      POSTGRES_DB: pravda_dev
    volumes:
      - pgdata_dev:/var/lib/postgresql
    ports:
      - "5432:5432"

  postgres_test:
    image: postgres:18
    environment:
      POSTGRES_USER: pravda
      POSTGRES_PASSWORD: pravda
      POSTGRES_DB: pravda_test
    volumes:
      - pgdata_test:/var/lib/postgresql
    ports:
      - "5433:5432"

volumes:
  pgdata_dev:
  pgdata_test:
