# Alembic configuration. The database connection is supplied at runtime by
# ``DATABASE_URL`` (see ``alembic/env.py``, which reuses the engine from
# ``pravda.db``), so there is no ``sqlalchemy.url`` here.

[alembic]
# Path to migration scripts, relative to this file.
script_location = %(here)s/alembic

# Make the project importable so env.py can ``from pravda.db import ...``.
prepend_sys_path = .

path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
