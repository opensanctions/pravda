# Alembic configuration for the developer workflow. The migration scripts
# live inside the ``pravda`` package (``src/pravda/migrations``) so they ship
# with installed distributions; this file only points the developer command at
# them. The database connection is supplied at runtime by ``DATABASE_URL``
# (see ``src/pravda/migrations/env.py``, which builds a one-shot engine from
# it), so there is no ``sqlalchemy.url`` here. The public ``pravda.migrate``
# API builds its own config and does not use this file.

[alembic]
# Path to migration scripts, relative to this file.
script_location = %(here)s/src/pravda/migrations

# Make the package importable so env.py can ``from pravda.db import ...``.
prepend_sys_path = src

path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
