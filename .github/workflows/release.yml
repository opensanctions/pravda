# Build and publish releases to PyPI using Trusted Publishing (OIDC).
#
# No API tokens are stored: PyPI trusts this specific workflow via
# https://docs.pypi.org/trusted-publishers/. One-time setup is required on
# PyPI and GitHub (see the repository README / release notes).
#
# The build and publish steps run in separate jobs so that the build
# machinery never holds the elevated `id-token: write` permission that
# Trusted Publishing relies on. PEP 740 provenance attestations are
# generated and uploaded to PyPI by pypa/gh-action-pypi-publish (on by
# default) and twine metadata is checked before upload.

name: release

on:
  release:
    types: [published]

# Least-privilege default; the publish job narrows this further.
permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Install Python
        run: uv python install

      - name: Build wheel and sdist
        # Disable uv-only dependency sources so the published package is
        # guaranteed to build with standard Python packaging tools.
        run: uv build --no-sources

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error
          retention-days: 14

  publish-browser:
    name: Publish browser image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: metadata
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}-browser
          tags: |
            type=semver,pattern={{version}},value=${{ github.event.release.tag_name }}
            type=semver,pattern={{major}}.{{minor}},value=${{ github.event.release.tag_name }}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build and publish browser image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Strongly recommended by PyPI: create a "pypi" environment in GitHub
    # repository settings and protect it (required reviewers, restricted to
    # the release tag). The environment name must match the trusted publisher
    # configured on PyPI.
    environment:
      name: pypi
      url: https://pypi.org/p/opensanctions-pravda
    permissions:
      # Required for Trusted Publishing and PEP 740 attestations. This is the
      # only permission granted to the publish job.
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          # Print file hashes so published artifacts can be audited.
          print-hash: true
          # Generate and upload PEP 740 Sigstore attestations (default, but
          # stated explicitly to document intent).
          attestations: true
